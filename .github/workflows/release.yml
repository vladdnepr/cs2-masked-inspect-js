name: Release

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write  # required for npm trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No registry-url — prevents setup-node from writing NODE_AUTH_TOKEN
          # to .npmrc, which would override OIDC trusted publishing auth

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public --provenance
